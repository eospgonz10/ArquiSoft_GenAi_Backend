spring:
  application:
    name: arquisoft-genai-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/arquisoft_db}
    username: ${DB_USER:arquisoft}
    password: ${DB_PASSWORD:arquisoft123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

jwt:
  secret: ${JWT_SECRET:dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBqd3QgYXV0aGVudGljYXRpb24gMjAyNA==}
  expiration-ms: 86400000  # 24 hours

openai:
  api-key: ${OPENAI_API_KEY:your-openai-api-key-here}
  model: ${OPENAI_MODEL:gpt-4o-mini}
  max-retries: ${OPENAI_MAX_RETRIES:2}

ai:
  provider: ${AI_PROVIDER:openai}  # 'openai' or 'mock'

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true

logging:
  level:
    com.arquisoft: INFO
    org.springframework.security: WARN
