version: '3.9'

services:

  postgres:
    image: postgres:15-alpine
    container_name: arquisoft_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: arquisoft_db
      POSTGRES_USER: ${DB_USER:-arquisoft}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-arquisoft123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-arquisoft} -d arquisoft_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arquisoft_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "49200:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://postgres:5432/arquisoft_db
      DB_USER: ${DB_USER:-arquisoft}
      DB_PASSWORD: ${DB_PASSWORD:-arquisoft123}
      JWT_SECRET: ${JWT_SECRET:-dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBqd3QgYXV0aGVudGljYXRpb24gMjAyNA==}
      # OpenAI (optional — only needed if AI_PROVIDER=openai)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      # Gemini (optional — only needed if AI_PROVIDER=gemini)
      GEMINI_API_KEY: ${GEMINI_API_KEY:-your-gemini-api-key-here}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      # Groq — free tier, 14400 req/day (recommended)
      GROQ_API_KEY: ${GROQ_API_KEY:-your-groq-api-key-here}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      AI_PROVIDER: ${AI_PROVIDER:-groq}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
